<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Practical Cheat Sheets Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   LIGHT THEME (DEFAULT)
───────────────────────────────────────── */
:root, [data-theme="light"] {
  --bg:        #f0f2f8;
  --surface:   #ffffff;
  --surface2:  #e8ebf5;
  --border:    #d4d8ee;
  --text:      #1c1f33;
  --muted:     #5a6180;
  --shadow:    0 2px 8px rgba(60,70,130,0.08), 0 0 0 1px rgba(60,70,130,0.05);

  --c-blue:   #1a56c4;   --c-blue-bg:   rgba(26,86,196,0.08); 
  --c-teal:   #0c7a6b;   --c-teal-bg:   rgba(12,122,107,0.08);
  --c-green:  #166534;   --c-green-bg:  rgba(22,101,52,0.08); 
  --c-amber:  #a05c00;   --c-amber-bg:  rgba(160,92,0,0.08);  
  --c-purple: #6d28d9;   --c-purple-bg: rgba(109,40,217,0.08);
}

/* ─────────────────────────────────────────
   DARK THEME
───────────────────────────────────────── */
[data-theme="dark"] {
  --bg:        #0d0f1c;
  --surface:   #13162a;
  --surface2:  #191d33;
  --border:    #262d4a;
  --text:      #e4e6f5;
  --muted:     #8b93b8;
  --shadow:    0 2px 10px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);

  --c-blue:   #5b9cf6;   --c-blue-bg:   rgba(91,156,246,0.12);
  --c-teal:   #2dd4bf;   --c-teal-bg:   rgba(45,212,191,0.10);
  --c-green:  #4ade80;   --c-green-bg:  rgba(74,222,128,0.10);
  --c-amber:  #fbbf24;   --c-amber-bg:  rgba(251,191,36,0.10);
  --c-purple: #c084fc;   --c-purple-bg: rgba(192,132,252,0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 13.5px;
  line-height: 1.6;
  padding: 14px 14px 30px;
  padding-top: 68px;
  transition: background .25s, color .25s;
  -webkit-font-smoothing: antialiased;
}

.theme-btn {
  position: fixed;
  top: 12px; right: 12px;
  z-index: 9999;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 6px 14px 6px 10px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  box-shadow: var(--shadow);
  font-family: 'Outfit', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--text);
  transition: all .22s;
  user-select: none;
  min-height: 40px;
}
.theme-btn:active { transform: scale(.94); }
.trk {
  width: 34px; height: 18px;
  background: var(--border);
  border-radius: 20px;
  position: relative;
  transition: background .3s;
  flex-shrink: 0;
}
[data-theme="dark"] .trk { background: var(--c-purple); }
.thmb {
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] .thmb { transform: translateX(16px); }
.ti { font-size: 15px; line-height: 1; }
.tlbl { white-space: nowrap; }

.header {
  text-align: center;
  padding: 18px 8px 14px;
  margin-bottom: 30px;
  border-bottom: 2px solid var(--border);
}
.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(1.25rem, 5vw, 2.2rem);
  font-weight: 900;
  color: var(--c-blue);
  text-transform: uppercase;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.header h1 span { color: var(--c-teal); }
.header p { color: var(--muted); font-size: 12px; margin-top: 5px; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }

.grid { display: grid; gap: 20px; max-width: 900px; margin: 0 auto; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }

a.card-link { text-decoration: none; color: inherit; display: block; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .2s, box-shadow .2s, background .25s, border-color .25s;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px var(--c-teal-bg);
}
.card::after {
  content:'';
  position: absolute;
  top:0; left:0; right:0;
  height: 4px;
  border-radius: 12px 12px 0 0;
}
.card.blue::after   { background: var(--c-blue); }
.card.teal::after   { background: var(--c-teal); }
.card.green::after  { background: var(--c-green); }

.card-icon {
  font-size: 40px;
  margin-bottom: 12px;
}
.ch-title {
  font-family: 'Outfit', sans-serif;
  font-size: 16px; font-weight: 800;
  line-height: 1.3;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}
.card.blue .ch-title { color: var(--c-blue); }
.card.teal .ch-title { color: var(--c-teal); }
.card.green .ch-title { color: var(--c-green); }

.ch-sub { font-size: 13px; color: var(--muted); font-weight: 500; }

@media (max-width: 768px) {
  .g3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
  <span class="ti" id="ti">☀️</span>
  <div class="trk"><div class="thmb"></div></div>
  <span class="tlbl" id="tlbl">Dark Mode</span>
</button>

<div class="header">
  <h1>📚 Practical <span>Cheat Sheets</span> Hub</h1>
  <p>CHOOSE A SUBJECT TO START STUDYING</p>
</div>

<div class="grid g3">
  <!-- Database -->
  <a href="db_cheatsheet.html" class="card-link">
    <div class="card teal">
      <div class="card-icon">🗄️</div>
      <div class="ch-title">Database Viva</div>
      <div class="ch-sub">DBMS, Normalisation, Primary & Foreign Keys</div>
    </div>
  </a>

  <!-- Excel -->
  <a href="excel_practical_cheatsheet.html" class="card-link">
    <div class="card green">
      <div class="card-icon">📊</div>
      <div class="ch-title">Excel Practical</div>
      <div class="ch-sub">Formulas, Lookups, Finance, Pivot Tables</div>
    </div>
  </a>

  <!-- Access -->
  <a href="access_practical_cheatsheet.html" class="card-link">
    <div class="card blue">
      <div class="card-icon">⚡</div>
      <div class="ch-title">Access Practical</div>
      <div class="ch-sub">Queries, Forms, Reports, Action Queries</div>
    </div>
  </a>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('ti').textContent = next === 'dark' ? '🌙' : '☀️';
  document.getElementById('tlbl').textContent = next === 'dark' ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('theme', next);
}
// Load saved theme
if(localStorage.getItem('theme')) {
  const saved = localStorage.getItem('theme');
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('ti').textContent = saved === 'dark' ? '🌙' : '☀️';
  document.getElementById('tlbl').textContent = saved === 'dark' ? 'Light Mode' : 'Dark Mode';
}
</script>

</body>
</html>
