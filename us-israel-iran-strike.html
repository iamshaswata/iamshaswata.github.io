<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live News Monitor — BBC &amp; Al Jazeera</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bbc:#bb1919; --aj:#e8272a; --aj-gold:#c8860e;
    --bg:#0c0c0c; --bg2:#111; --surface:#161616; --card:#1c1c1c;
    --border:#272727; --border2:#333;
    --text:#e5e1d8; --text2:#a09c93; --muted:#585858;
    --shadow:rgba(0,0,0,.7); --header-bg:#0f0f0f; --header-line:#1e1e1e;
    --toggle-bg:#222; --input-bg:#0d0d0d; --progress-bg:#1e1e1e;
    --dot-border:#0c0c0c; --tr:.25s ease;
  }
  [data-theme="light"] {
    --bg:#f5f3ef; --bg2:#ede9e3; --surface:#eae6e0; --card:#fff;
    --border:#d8d4cc; --border2:#c4c0b8;
    --text:#1a1814; --text2:#5a5650; --muted:#9a9690;
    --shadow:rgba(0,0,0,.1); --header-bg:#fff; --header-line:#e0dcd6;
    --toggle-bg:#d0ccc4; --input-bg:#f0ece6; --progress-bg:#ddd9d3;
    --dot-border:#f5f3ef;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;min-height:100vh;transition:background var(--tr),color var(--tr)}

  /* ── MASTHEAD ── */
  .mast{background:var(--header-bg);border-bottom:1px solid var(--header-line);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px var(--shadow);transition:background var(--tr),border-color var(--tr)}
  .mast-top{display:flex;align-items:center;gap:.9rem;padding:0 1.4rem;height:52px;border-bottom:1px solid var(--header-line)}
  .logo-bbc{display:flex;gap:3px}
  .logo-bbc span{width:27px;height:27px;background:var(--bbc);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:13px}
  .logo-sep{width:1px;height:26px;background:var(--border2)}
  .logo-aj{background:var(--aj);color:#fff;font-family:'Playfair Display',serif;font-weight:900;font-size:11px;padding:4px 8px;letter-spacing:.03em}
  .logo-aj-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .mast-title{font-family:'Playfair Display',serif;font-style:italic;font-size:.9rem;color:var(--text2)}
  .mast-right{margin-left:auto;display:flex;align-items:center;gap:.7rem}
  .live-pill{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--aj);border:1px solid rgba(232,39,42,.3);background:rgba(232,39,42,.07);padding:3px 9px;border-radius:2px}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--aj);animation:blink 1.4s ease infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .th-toggle{cursor:pointer;width:40px;height:21px;background:var(--toggle-bg);border-radius:11px;border:1px solid var(--border2);position:relative;transition:background var(--tr);flex-shrink:0}
  .th-toggle::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .2s ease;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  [data-theme="light"] .th-toggle::after{transform:translateX(19px)}
  .th-icon{font-size:.7rem;user-select:none;color:var(--text2)}
  .mast-tabs{display:flex;padding:0 1.4rem}
  .tab{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.07em;text-transform:uppercase;padding:.65rem 1.3rem;border:none;border-bottom:2px solid transparent;background:none;color:var(--muted);cursor:pointer;transition:color .15s,border-color .15s}
  .tab:hover{color:var(--text)}
  .tab.bbc.active{color:var(--bbc);border-bottom-color:var(--bbc)}
  .tab.aj.active{color:var(--aj);border-bottom-color:var(--aj)}
  .tab.both.active{color:var(--aj-gold);border-bottom-color:var(--aj-gold)}

  /* ── LAYOUT ── */
  .page{max-width:780px;margin:0 auto;padding:1.6rem 1.2rem 6rem}

  /* ── STATUS STRIP ── */
  .sstrip{display:none;font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--muted);padding:.5rem .8rem;border-left:3px solid var(--border2);background:var(--surface);margin-bottom:1.3rem;flex-wrap:wrap;gap:.4rem 1rem;transition:background var(--tr)}
  .sstrip em{color:var(--text);font-style:normal}
  .sstrip.bbc{border-left-color:var(--bbc)}
  .sstrip.aj{border-left-color:var(--aj)}
  .sstrip.both{border-left-color:var(--aj-gold)}

  /* ── TOOLBAR ── */
  .tbar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.4rem}
  .btn{font-family:'JetBrains Mono',monospace;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;padding:.38rem .9rem;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;border-radius:2px;transition:all .15s}
  .btn:hover{color:var(--text);border-color:var(--border2)}
  .btn.red{background:var(--bbc);border-color:var(--bbc);color:#fff}
  .btn.red:hover{background:#a01515;border-color:#a01515}
  .btn.ajbtn{background:var(--aj);border-color:var(--aj);color:#fff}
  .btn.ajbtn:hover{background:#c82020;border-color:#c82020}
  .btn.goldbtn{background:var(--aj-gold);border-color:var(--aj-gold);color:#fff}
  .btn:disabled{opacity:.3;cursor:not-allowed}
  .btn:disabled:hover{background:var(--surface);color:var(--text2);border-color:var(--border)}
  .pginfo{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--muted)}

  /* ── LOADER ── */
  .loader{text-align:center;padding:4.5rem 1rem;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--muted)}
  .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--bbc);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 1rem}
  .spin.gold{border-top-color:var(--aj-gold)}
  .lsub{margin-top:.4rem;font-size:.63rem;color:var(--muted);opacity:.65}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── PROGRESS ── */
  .prog-wrap{margin-bottom:1.5rem}
  .prog-out{height:2px;background:var(--progress-bg);border-radius:1px;overflow:hidden}
  .prog-in{height:100%;width:0%;transition:width .18s ease}
  .prog-in.red{background:var(--bbc)}
  .prog-in.gold{background:var(--aj-gold)}
  .prog-lbl{margin-top:.35rem;font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--muted)}

  /* ── FEED ── */
  .feed{display:none;flex-direction:column}
  .post{display:flex;animation:fadeUp .28s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  .tl{display:flex;flex-direction:column;align-items:center;width:25px;flex-shrink:0;padding-top:1.4rem}
  .tl-dot{width:9px;height:9px;border-radius:50%;background:var(--border2);border:2px solid var(--dot-border);flex-shrink:0;z-index:1;transition:background var(--tr),border-color var(--tr)}
  .post.src-bbc .tl-dot{background:var(--bbc)}
  .post.src-aj  .tl-dot{background:var(--aj)}
  .tl-line{width:2px;flex:1;background:var(--border);min-height:16px;transition:background var(--tr)}
  .post:last-child .tl-line{background:transparent}
  .card{flex:1;padding:1.25rem 0 1.6rem 1rem}
  .pmeta{display:flex;align-items:center;flex-wrap:wrap;gap:.45rem .65rem;margin-bottom:.5rem}
  .sbadge{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px;font-weight:500}
  .sbadge.bbc{background:var(--bbc);color:#fff}
  .sbadge.aj{background:var(--aj);color:#fff}
  .itime{font-family:'JetBrains Mono',monospace;font-size:.67rem}
  .post.src-bbc .itime{color:#d4846a}
  .post.src-aj  .itime{color:var(--aj-gold)}
  [data-theme="light"] .post.src-bbc .itime{color:#b05030}
  [data-theme="light"] .post.src-aj  .itime{color:#9a6208}
  .gmtref{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted)}
  .phead{font-family:'Playfair Display',serif;font-weight:700;font-size:1.12rem;line-height:1.32;color:var(--text);margin-bottom:.6rem;transition:color var(--tr)}
  .pbody{font-size:.93rem;line-height:1.76;color:var(--text2);transition:color var(--tr)}
  .pbody p{margin-bottom:.55rem}
  .pbody p:last-child{margin-bottom:0}
  [data-theme="light"] .pbody{color:#4a4640}
  .contrib{display:flex;align-items:center;gap:.6rem;margin-top:.85rem;padding:.5rem .7rem;background:var(--bg2);border-left:2px solid var(--border2);transition:background var(--tr),border-color var(--tr)}
  .contrib img{width:33px;height:33px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
  .cname{font-size:.8rem;font-weight:600;color:var(--text);transition:color var(--tr)}
  .crole{font-size:.7rem;color:var(--muted);font-style:italic}

  /* ── ERROR / PASTE ── */
  .ebox{background:rgba(232,39,42,.07);border:1px solid rgba(232,39,42,.22);padding:1.25rem;border-radius:3px;color:#ff9090;font-size:.85rem}
  .ebox code{display:block;margin-top:.45rem;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#ff7070;word-break:break-all}
  .ehint{margin-top:.65rem;font-size:.76rem;color:var(--text2);line-height:1.6}
  .parea{width:100%;height:150px;background:var(--input-bg);color:#9cdcfe;font-family:'JetBrains Mono',monospace;font-size:.68rem;border:1px solid var(--border);padding:.7rem;resize:vertical;border-radius:2px;margin-top:.65rem;transition:background var(--tr),border-color var(--tr)}



  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  </style>
</head>
<body>

<!-- MASTHEAD -->
<div class="mast">
  <div class="mast-top">
    <div class="logo-bbc"><span>B</span><span>B</span><span>C</span></div>
    <div class="logo-sep"></div>
    <div class="logo-aj">Al Jazeera</div><span class="logo-aj-sub">English</span>
    <div class="mast-title">Live News Monitor</div>
    <div class="mast-right">
      <div class="live-pill"><div class="live-dot"></div>Live &middot; IST</div>
      <span class="th-icon" id="thicon">☀️</span>
      <div class="th-toggle" id="thtoggle"></div>
    </div>
  </div>
  <div class="mast-tabs">
    <button class="tab bbc active" onclick="switchTab('bbc')">BBC</button>
    <button class="tab aj"         onclick="switchTab('aj')">Al Jazeera</button>
    <button class="tab both"       onclick="switchTab('both')">Both</button>
  </div>
</div>

<div class="page">

  <!-- BBC PANEL -->
  <div id="panel-bbc">
    <div class="sstrip bbc" id="bbc-strip">
      <em id="bbc-cnt">-</em> posts &nbsp;·&nbsp; Page <em id="bbc-pg">-</em> / <em id="bbc-pgs">-</em> &nbsp;·&nbsp; Updated <em id="bbc-upd">-</em> IST
    </div>
    <div class="tbar">
      <button class="btn red"  onclick="bbcRefresh()">&#8635; Refresh</button>
      <button class="btn" id="bbc-prev" onclick="bbcGo(bbcPage-1)" disabled>&#8592; Prev</button>
      <button class="btn" id="bbc-next" onclick="bbcGo(bbcPage+1)" disabled>Next &#8594;</button>
      <span class="pginfo" id="bbc-pgi"></span>
    </div>
    <div class="loader" id="bbc-load"><div class="spin"></div><div>Fetching BBC stream…</div></div>
    <div class="feed"   id="bbc-feed"></div>
  </div>

  <!-- AJ PANEL -->
  <div id="panel-aj" style="display:none">
    <div class="sstrip aj" id="aj-strip">
      <em id="aj-tot">-</em> total &nbsp;·&nbsp; Page <em id="aj-pg">-</em> / <em id="aj-pgs">-</em> &nbsp;·&nbsp; Updated <em id="aj-upd">-</em> IST
    </div>
    <div class="tbar">
      <button class="btn ajbtn" onclick="ajInit()">&#8635; Refresh</button>
      <button class="btn" id="aj-prev" onclick="ajGo(ajPage-1)" disabled>&#8592; Prev</button>
      <button class="btn" id="aj-next" onclick="ajGo(ajPage+1)" disabled>Next &#8594;</button>
      <span class="pginfo" id="aj-pgi"></span>
    </div>
    <div class="loader" id="aj-load" style="display:none">
      <div class="spin gold"></div>
      <div id="aj-lmsg">Fetching post list…</div>
      <div class="lsub" id="aj-lsub"></div>
    </div>
    <div class="prog-wrap" id="aj-prog" style="display:none">
      <div class="prog-out"><div class="prog-in gold" id="aj-pbar"></div></div>
      <div class="prog-lbl" id="aj-plbl"></div>
    </div>
    <div class="feed" id="aj-feed"></div>
  </div>

  <!-- BOTH PANEL -->
  <div id="panel-both" style="display:none">
    <div class="sstrip both" id="both-strip">
      <em id="both-cnt">-</em> posts combined &nbsp;·&nbsp; Updated <em id="both-upd">-</em> IST
    </div>
    <div class="tbar">
      <span class="pginfo" id="both-note" style="margin-left:0;color:var(--muted);font-size:.67rem;font-family:'JetBrains Mono',monospace">Waiting for feeds…</span>
    </div>
    <div class="feed" id="both-feed"></div>
  </div>

</div>

<script>
/* ─── THEME ─── */
const html = document.documentElement;
document.getElementById('thtoggle').addEventListener('click', () => {
  const t = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = t;
  document.getElementById('thicon').textContent = t === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('lnm-theme', t);
});
(function(){
  const saved = localStorage.getItem('lnm-theme') || 'dark';
  html.dataset.theme = saved;
  document.getElementById('thicon').textContent = saved === 'dark' ? '☀️' : '🌙';
})();

/* ─── TABS ─── */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab.' + t).classList.add('active');
  ['bbc','aj','both'].forEach(id =>
    document.getElementById('panel-' + id).style.display = id === t ? '' : 'none');
}

/* ─── UTILS ─── */
function toIST(iso) {
  try {
    const d   = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
    const ist = new Date(d.getTime() + 5.5 * 3600000);
    const dd  = String(ist.getUTCDate()).padStart(2,'0');
    const mon = 'Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec'.split(' ')[ist.getUTCMonth()];
    const yr  = ist.getUTCFullYear();
    const h   = ist.getUTCHours(); const hh = h % 12 || 12;
    const mm  = String(ist.getUTCMinutes()).padStart(2,'0');
    const ap  = h >= 12 ? 'PM' : 'AM';
    return `${dd} ${mon} ${yr}, ${String(hh).padStart(2,'0')}:${mm} ${ap}`;
  } catch { return iso; }
}
function nowISTShort() {
  const ist = new Date(Date.now() + 5.5 * 3600000);
  return String(ist.getUTCHours()).padStart(2,'0') + ':' + String(ist.getUTCMinutes()).padStart(2,'0');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function decode(s) {
  return String(s)
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&#8220;/g,'"').replace(/&#8221;/g,'"')
    .replace(/&#8216;/g,"'").replace(/&#8217;/g,"'")
    .replace(/&#8212;/g,'—').replace(/&#8211;/g,'–')
    .replace(/&nbsp;/g,' ')
    .replace(/&#(\d+);/g,(_,n)=>{try{return String.fromCharCode(+n)}catch{return _}});
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ─── SHARED POST BUILDER ─── */
function mkPost(entry, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'post src-' + entry.src;
  wrap.style.animationDelay = idx * 0.033 + 's';
  wrap.dataset.ts = entry.rawTs || '';

  const paras = (entry.content || '').split(/\n\n+/)
    .map(p => p.trim()).filter(Boolean)
    .map(p => '<p>' + esc(p) + '</p>').join('');

  const contribHtml = entry.contrib ? `
    <div class="contrib">
      ${entry.contrib.img ? `<img src="${entry.contrib.img}" alt="${esc(entry.contrib.name)}" loading="lazy">` : ''}
      <div><div class="cname">${esc(entry.contrib.name)}</div>
      ${entry.contrib.role ? `<div class="crole">${esc(entry.contrib.role)}</div>` : ''}</div>
    </div>` : '';

  wrap.innerHTML = `
    <div class="tl"><div class="tl-dot"></div><div class="tl-line"></div></div>
    <div class="card">
      <div class="pmeta">
        <span class="sbadge ${entry.src}">${entry.src === 'bbc' ? 'BBC' : 'Al Jazeera'}</span>
        ${entry.istTime ? `<span class="itime">&#128336; ${entry.istTime} IST</span>` : ''}
        ${entry.gmtRef  ? `<span class="gmtref">(${entry.gmtRef})</span>` : ''}
      </div>
      ${entry.headline ? `<div class="phead">${esc(entry.headline)}</div>` : ''}
      <div class="pbody">${paras || '<p style="color:var(--muted);font-style:italic;font-size:.82rem">[No content]</p>'}</div>
      ${contribHtml}
    </div>`;
  return wrap;
}

/* ════════════════════════════════
   BBC
════════════════════════════════ */
const BBC_API = 'https://web-cdn.api.bbci.co.uk/wc-poll-data/container/stream';
const BBC_QS  = 'assetId=cn5ge95q6y7t&enableDotcomAds=false&globalContainerPolling=true&language=en-GB&liveTextStreamId=180A3F79F36B4235B1CD63986A6D101B&pageSize=40&pageUrl=%2Fnews%2Flive%2Fcn5ge95q6y7t&reactionsEnabledForAssetType=true&reactionsEnabledToggle=false&sortOrder=newestFirst&uasEnv=live';
let bbcPage = 1, bbcPages = 1, bbcCache = [];

function bbcParsePost(p) {
  let headline = '';
  try { headline = p.headline.model.blocks[0].model.text || ''; } catch {}
  const blocks = p.content?.model?.blocks || [];
  const parts = blocks
    .filter(b => b.type === 'paragraph' || b.type === 'fragment')
    .map(b => (b.model?.text || '').trim()).filter(Boolean);
  let contrib = null;
  for (const b of (p.header?.model?.blocks || [])) {
    if (b.type === 'contributor')
      contrib = { name: b.model?.name||'', role: b.model?.subtitle||'', img: b.model?.blocks?.[0]?.model?.imageSrc||'' };
  }
  const rawTs = p.unformattedTime || p.dates?.firstPublished || p.dates?.curated || '';
  return { src:'bbc', rawTs, istTime: rawTs ? toIST(rawTs) : '', gmtRef: p.timestamp||'', headline, content: parts.join('\n\n'), contrib };
}

function bbcRender(data) {
  const posts = data.results || [];
  bbcPages = data.page?.total || 1;
  bbcPage  = data.page?.index || bbcPage;
  bbcCache = posts.map(bbcParsePost);
  document.getElementById('bbc-strip').style.display = 'flex';
  document.getElementById('bbc-cnt').textContent  = posts.length;
  document.getElementById('bbc-pg').textContent   = bbcPage;
  document.getElementById('bbc-pgs').textContent  = bbcPages;
  document.getElementById('bbc-upd').textContent  = nowISTShort();
  document.getElementById('bbc-pgi').textContent  = 'Page ' + bbcPage + ' / ' + bbcPages;
  document.getElementById('bbc-prev').disabled = bbcPage <= 1;
  document.getElementById('bbc-next').disabled = bbcPage >= bbcPages;
  const feed = document.getElementById('bbc-feed');
  feed.innerHTML = '';
  if (!bbcCache.length) { feed.innerHTML = '<div class="ebox">No posts found. View Raw JSON.</div>'; }
  else bbcCache.forEach((e,i) => feed.appendChild(mkPost(e,i)));
  document.getElementById('bbc-load').style.display = 'none';
  feed.style.display = 'flex'; feed.style.flexDirection = 'column';
  renderBoth();
}

function bbcError(e) {
  document.getElementById('bbc-load').style.display = 'none';
  const feed = document.getElementById('bbc-feed');
  feed.innerHTML = `<div class="ebox"><strong>BBC load failed</strong><code>${e.message}</code>
    <div class="ehint">CORS may be blocking. Paste raw API JSON below:</div>
    <textarea class="parea" id="bbc-paste" placeholder="Paste BBC API JSON here…"></textarea>
    <button class="btn red" onclick="bbcPasted()" style="margin-top:.5rem">Load Pasted JSON</button></div>`;
  feed.style.display='flex'; feed.style.flexDirection='column';
}
function bbcPasted() {
  try {
    const data = JSON.parse(document.getElementById('bbc-paste').value.trim());
    document.getElementById('bbc-rawbody').textContent = JSON.stringify(data, null, 2);
    bbcRender(data);
  } catch(e) { alert('Invalid JSON: ' + e.message); }
}
async function bbcRefresh() {
  document.getElementById('bbc-load').style.display = 'block';
  document.getElementById('bbc-feed').style.display = 'none';
  document.getElementById('bbc-feed').innerHTML = '';
  try {
    const res = await fetch(`${BBC_API}?${BBC_QS}&pageNumber=${bbcPage}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    bbcRender(data);
  } catch(e) { bbcError(e); }
}
async function bbcGo(p) {
  if (p < 1 || p > bbcPages) return;
  bbcPage = p; await bbcRefresh(); scrollTo({ top:0, behavior:'smooth' });
}

/* ════════════════════════════════
   AL JAZEERA
════════════════════════════════ */
const AJ_GQL      = 'https://www.aljazeera.com/graphql';
const AJ_POSTNAME = 'live-israel-launches-attacks-on-iran-multiple-explosions-heard-in-tehran';
const AJ_PS       = 40;
let ajAllIDs = [], ajPage = 1, ajPages = 1, ajCache = [];

async function ajFetchIDs() {
  const v = JSON.stringify({ postName: AJ_POSTNAME });
  const p = new URLSearchParams({'wp-site':'aje',operationName:'SingleLiveBlogChildrensQuery',variables:v,extensions:'{}'});
  const r = await fetch(`${AJ_GQL}?${p}`, { headers:{'Accept':'application/json'} });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  const c = d?.data?.article?.children;
  if (Array.isArray(c)) return c.map(Number).filter(Boolean);
  return [];
}
async function ajFetchOne(id) {
  const v = JSON.stringify({ postID: id, postType:'liveblog-update', preview:'', isAmp:false });
  const p = new URLSearchParams({'wp-site':'aje',operationName:'LiveBlogUpdateQuery',variables:v,extensions:'{}'});
  const r = await fetch(`${AJ_GQL}?${p}`, { headers:{'Accept':'application/json'} });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
function ajParse(data) {
  const node = data?.data?.posts || data?.data?.post || data?.data?.liveblogUpdate;
  if (!node) return null;
  const raw = (node.content || node.excerpt || '').replace(/<[^>]+>/g,' ').replace(/\s{2,}/g,' ');
  return {
    src: 'aj',
    rawTs:    node.date || node.dateGmt || '',
    istTime:  node.date ? toIST(node.date) : '',
    gmtRef:   '',
    headline: decode(node.title || ''),
    content:  decode(raw).replace(/\n{3,}/g,'\n\n').trim(),
    contrib:  null
  };
}
async function ajInit() {
  document.getElementById('aj-load').style.display = 'block';
  document.getElementById('aj-lmsg').textContent = 'Fetching post list…';
  document.getElementById('aj-lsub').textContent = '';
  document.getElementById('aj-feed').style.display = 'none';
  document.getElementById('aj-feed').innerHTML = '';
  document.getElementById('aj-prog').style.display = 'none';
  document.getElementById('aj-strip').style.display = 'none';
  try {
    ajAllIDs = await ajFetchIDs();
    if (!ajAllIDs.length) throw new Error('No post IDs returned');
    ajPages = Math.ceil(ajAllIDs.length / AJ_PS);
    ajPage  = 1;
    await ajLoadPage(1);
  } catch(e) { ajError(e); }
}
async function ajLoadPage(page) {
  ajPage = page;
  document.getElementById('aj-load').style.display = 'block';
  document.getElementById('aj-lmsg').textContent   = 'Loading page ' + page + '…';
  document.getElementById('aj-feed').style.display = 'none';
  document.getElementById('aj-feed').innerHTML     = '';
  document.getElementById('aj-prog').style.display = 'block';
  const start = (page - 1) * AJ_PS;
  const ids   = ajAllIDs.slice(start, start + AJ_PS);
  const posts = []; ajCache = [];
  for (let i = 0; i < ids.length; i++) {
    const pct = Math.round((i+1)/ids.length*100);
    document.getElementById('aj-pbar').style.width = pct + '%';
    document.getElementById('aj-plbl').textContent = 'Post ' + (i+1) + ' / ' + ids.length;
    try {
      const e = ajParse(await ajFetchOne(ids[i]));
      if (e) { posts.push(e); ajCache.push(e); }
    } catch(err) { console.warn('AJ post', ids[i], err.message); }
    await sleep(120);
  }
  document.getElementById('aj-strip').style.display = 'flex';
  document.getElementById('aj-tot').textContent  = ajAllIDs.length;
  document.getElementById('aj-pg').textContent   = page;
  document.getElementById('aj-pgs').textContent  = ajPages;
  document.getElementById('aj-upd').textContent  = nowISTShort();
  document.getElementById('aj-pgi').textContent  = 'Page ' + page + ' / ' + ajPages;
  document.getElementById('aj-prev').disabled = page <= 1;
  document.getElementById('aj-next').disabled = page >= ajPages;
  const feed = document.getElementById('aj-feed');
  if (!posts.length) { feed.innerHTML = '<div class="ebox">No posts parsed for this page.</div>'; }
  else posts.forEach((e,i) => feed.appendChild(mkPost(e,i)));
  document.getElementById('aj-load').style.display = 'none';
  document.getElementById('aj-prog').style.display = 'none';
  feed.style.display='flex'; feed.style.flexDirection='column';
  scrollTo({ top:0, behavior:'smooth' });
  renderBoth();
}
async function ajGo(p) {
  if (p < 1 || p > ajPages || !ajAllIDs.length) return;
  await ajLoadPage(p);
}
function ajError(e) {
  document.getElementById('aj-load').style.display = 'none';
  document.getElementById('aj-prog').style.display = 'none';
  const feed = document.getElementById('aj-feed');
  feed.innerHTML = `<div class="ebox"><strong>Al Jazeera load failed</strong><code>${e.message}</code>
    <div class="ehint">CORS may block this. Paste children IDs JSON or full response below:</div>
    <textarea class="parea" id="aj-paste" placeholder='Paste [12345, 12344, ...] or full GraphQL response…'></textarea>
    <button class="btn ajbtn" onclick="ajPasted()" style="margin-top:.5rem">Load Pasted</button></div>`;
  feed.style.display='flex'; feed.style.flexDirection='column';
}
async function ajPasted() {
  try {
    const parsed = JSON.parse(document.getElementById('aj-paste').value.trim());
    if (parsed?.data?.article?.children) ajAllIDs = parsed.data.article.children.map(Number).filter(Boolean);
    else if (Array.isArray(parsed)) ajAllIDs = parsed.map(Number).filter(Boolean);
    else throw new Error('Expected array or full response JSON');
    if (!ajAllIDs.length) throw new Error('No IDs found');
    ajPages = Math.ceil(ajAllIDs.length / AJ_PS);
    ajPage  = 1;
    document.getElementById('aj-feed').innerHTML = '';
    await ajLoadPage(1);
  } catch(e) { alert('Error: ' + e.message); }
}

/* ════════════════════════════════
   BOTH / MERGED
════════════════════════════════ */
function renderBoth() {
  if (!bbcCache.length && !ajCache.length) return;
  const all = [...bbcCache, ...ajCache].sort((a,b) => {
    const ta = a.rawTs ? new Date(a.rawTs.endsWith('Z') ? a.rawTs : a.rawTs+'Z').getTime() : 0;
    const tb = b.rawTs ? new Date(b.rawTs.endsWith('Z') ? b.rawTs : b.rawTs+'Z').getTime() : 0;
    return tb - ta;
  });
  document.getElementById('both-strip').style.display = 'flex';
  document.getElementById('both-cnt').textContent  = all.length;
  document.getElementById('both-upd').textContent  = nowISTShort();
  document.getElementById('both-note').textContent = bbcCache.length + ' BBC + ' + ajCache.length + ' AJ';
  const feed = document.getElementById('both-feed');
  feed.innerHTML = '';
  all.forEach((e,i) => feed.appendChild(mkPost(e,i)));
  feed.style.display='flex'; feed.style.flexDirection='column';
}

/* ════════════════════════════════
   INIT & AUTO-REFRESH
════════════════════════════════ */
bbcRefresh();
ajInit();

// Auto-refresh every 20 seconds
setInterval(() => {
  if (bbcPage === 1) bbcRefresh();
  if (ajPage  === 1) ajInit();
}, 20000);
</script>
